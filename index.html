<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIT Academic Calendar Visualizer</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      color: #333;
      margin: 0;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .file-upload {
      text-align: center;
      margin-bottom: 20px;
      background: #fff;
      padding: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    .month-section {
      background: #fff;
      border-radius: 10px;
      padding: 20px;
      margin-bottom: 30px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    .month-title {
      color: #2c3e50;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
      margin-top: 0;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
      margin-top: 15px;
    }

    .day-header {
      text-align: center;
      font-weight: bold;
      color: #7f8c8d;
      padding: 10px 0;
      background: #ecf0f1;
      border-radius: 5px;
    }

    .day-cell {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 10px;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      transition: transform 0.1s;
    }

    .day-cell:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    .day-cell.blank {
      background: transparent;
      border: none;
      box-shadow: none;
    }

    .date-num {
      font-size: 1.2em;
      font-weight: bold;
      margin-bottom: 5px;
      color: #34495e;
    }

    .badge {
      display: inline-block;
      padding: 3px 6px;
      border-radius: 4px;
      font-size: 0.75em;
      font-weight: bold;
      margin-bottom: 5px;
      align-self: flex-start;
    }

    .note {
      font-size: 0.8em;
      color: #555;
      line-height: 1.3;
      margin-top: auto;
      /* Pushes text to bottom */
    }

    /* Color Coding based on your schema */
    .type-Instructional {
      border-left: 5px solid #2ecc71;
      background-color: #f4fff8;
    }

    .type-Instructional .badge {
      background-color: #2ecc71;
      color: white;
    }

    .type-Holiday {
      border-left: 5px solid #e74c3c;
      background-color: #fff6f5;
      opacity: 0.8;
    }

    .type-Holiday .badge {
      background-color: #e74c3c;
      color: white;
    }

    .type-CAT-1,
    .type-CAT-2 {
      border-left: 5px solid #f39c12;
      background-color: #fffbf2;
    }

    .type-CAT-1 .badge,
    .type-CAT-2 .badge {
      background-color: #f39c12;
      color: white;
    }

    .type-Exam {
      border-left: 5px solid #9b59b6;
      background-color: #fbf6ff;
    }

    .type-Exam .badge {
      background-color: #9b59b6;
      color: white;
    }

    .type-null {
      border-left: 5px solid #95a5a6;
      background-color: #fafafa;
    }

    .type-null .badge {
      background-color: #95a5a6;
      color: white;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>VIT Calendar Visualizer</h1>
    <h3 id="meta-info" style="color: #7f8c8d; font-weight: normal;">Please upload your generated JSON file</h3>
  </div>

  <div class="file-upload">
    <label for="jsonUpload" style="font-weight: bold; margin-right: 10px;">Select Calendar JSON:</label>
    <input type="file" id="jsonUpload" accept=".json">
  </div>

  <div id="calendar-container"></div>

  <script>
    document.getElementById('jsonUpload').addEventListener('change', function (event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function (e) {
          try {
            const jsonData = JSON.parse(e.target.result);
            renderCalendar(jsonData);
          } catch (err) {
            alert('Error parsing JSON file!');
            console.error(err);
          }
        };
        reader.readAsText(file);
      }
    });

    function renderCalendar(dataObj) {
      const container = document.getElementById('calendar-container');
      container.innerHTML = '';

      // Handle Metadata
      const meta = dataObj.metadata;
      document.getElementById('meta-info').innerHTML =
        `<b>${meta.semester} Semester ${meta.year}</b> &nbsp;|&nbsp; Total Instructional Days: <b style="color:#2ecc71;">${meta.totalInstructionalDays}</b>`;

      const months = Object.keys(dataObj.data);

      months.forEach(monthKey => {
        const monthData = dataObj.data[monthKey];

        const section = document.createElement('div');
        section.className = 'month-section';

        // Format "2025-12" to "December 2025"
        const dateObj = new Date(monthKey + "-01");
        const monthName = dateObj.toLocaleString('default', { month: 'long', year: 'numeric' });

        const title = document.createElement('h2');
        title.className = 'month-title';
        title.innerText = monthName;
        section.appendChild(title);

        const grid = document.createElement('div');
        grid.className = 'calendar-grid';

        // Render Weekday Headers (Monday to Sunday)
        const daysOfWeek = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        daysOfWeek.forEach(day => {
          const header = document.createElement('div');
          header.className = 'day-header';
          header.innerText = day;
          grid.appendChild(header);
        });

        // Render Blank Cells for Offset
        // Since ISO dayOfWeek is 1 (Mon) to 7 (Sun), the offset is just dayOfWeek - 1
        const firstDayOfMonth = monthData[0];
        const offset = firstDayOfMonth.dayOfWeek - 1;

        for (let i = 0; i < offset; i++) {
          const blank = document.createElement('div');
          blank.className = 'day-cell blank';
          grid.appendChild(blank);
        }

        // Render Actual Days
        monthData.forEach(day => {
          const cell = document.createElement('div');

          // Safely grab the type for CSS classes (fallback to null)
          const typeClass = day.type ? day.type.replace(/\s+/g, '') : 'null';
          cell.className = `day-cell type-${typeClass}`;

          const dateNum = day.date.split('-')[2]; // Extracts '05' from '2025-12-05'

          // Logic to display the cleanest note possible
          // Tries new "note" first, falls back to "secondaryDetail", then "primaryDetail"
          let detailText = day.note || day.secondaryDetail || day.primaryDetail || '';

          // Hide redundant words to keep UI clean
          if (detailText === 'Holiday' || detailText === 'Sunday' || detailText === 'Instructional Day') {
            detailText = '';
          }

          const displayType = day.type || 'No Event';

          cell.innerHTML = `
                        <div class="date-num">${dateNum}</div>
                        <span class="badge">${displayType}</span>
                        <div class="note">${detailText}</div>
                    `;

          grid.appendChild(cell);
        });

        section.appendChild(grid);
        container.appendChild(section);
      });
    }
  </script>
</body>

</html>
